<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Guest Manager Pro</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app">
        <header>
            <h1>Guest Manager <span>System</span></h1>
            <div class="stats-bar">
                <p>Total: <span id="total-count">0</span></p>
                <p>Começam com "A": <span id="count-a">0</span></p>
            </div>
            <div class="input-group">
                <input type="text" id="guest-input" placeholder="Digite um nome...">
                <button onclick="addGuest()">Adicionar</button>
            </div>
        </header>

        <main class="grid-container">
            <section class="card">
                <h2>Uppercase</h2>
                <ul id="list-upper" class="list"></ul>
            </section>

            <section class="card">
                <h2>Nomes Curtos (≤ 5)</h2>
                <ul id="list-short" class="list"></ul>
            </section>

            <section class="card">
                <h2>Nomes Longos (> 5)</h2>
                <ul id="list-long" class="list"></ul>
            </section>
        </main>
    </div>
    <script src="script.js"></script>
</body>
</html>
