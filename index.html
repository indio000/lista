<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GuestFlow | Smart Management</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>
    <div class="container">
        <header>
            <div class="logo-area">
                <i data-lucide="users" class="icon-logo"></i>
                <h1>Guest<span>Flow</span></h1>
            </div>
            
            <div class="input-wrapper">
                <input type="text" id="guest-input" placeholder="Nome do convidado..." autocomplete="off">
                <button id="add-btn"><i data-lucide="plus"></i></button>
            </div>

            <div class="dashboard">
                <div class="stat-card">
                    <small>Total</small>
                    <p id="total-count">0</p>
                </div>
                <div class="stat-card highlight">
                    <small>Iniciais com "A"</small>
                    <p id="count-a">0</p>
                </div>
            </div>
        </header>

        <main class="lists-grid">
            <section class="list-container">
                <div class="list-header">
                    <i data-lucide="case-sensitive"></i>
                    <h3>Uppercase</h3>
                </div>
                <ul id="list-upper" class="scroll-area"></ul>
            </section>

            <section class="list-container">
                <div class="list-header">
                    <i data-lucide="minimize-2"></i>
                    <h3>Curtos (≤ 5)</h3>
                </div>
                <ul id="list-short" class="scroll-area"></ul>
            </section>

            <section class="list-container">
                <div class="list-header">
                    <i data-lucide="maximize-2"></i>
                    <h3>Longos (> 5)</h3>
                </div>
                <ul id="list-long" class="scroll-area"></ul>
            </section>
        </main>
    </div>
    <script src="script.js"></script>
</body>
</html>
